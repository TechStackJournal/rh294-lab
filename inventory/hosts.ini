# RH294 Lab Static Inventory
# This file is also written to /home/ansible/inventory/hosts.ini by Vagrant provisioning

[control]
control.lab.example.com ansible_host=192.168.56.10 ansible_connection=local

[webservers]
node1.lab.example.com ansible_host=192.168.56.11
node2.lab.example.com ansible_host=192.168.56.12

[dbservers]
node3.lab.example.com ansible_host=192.168.56.13

[managed:children]
webservers
dbservers

[production:children]
webservers
dbservers

[all:vars]
ansible_user=ansible
ansible_ssh_private_key_file=~/.ssh/id_ed25519
